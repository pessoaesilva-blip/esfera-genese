<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Eclipse</title>

<style>
body{
margin:0;
background:radial-gradient(circle at center,#12002a 0%,#000 70%);
overflow:hidden;
font-family:Segoe UI,sans-serif;
color:white;
}

/* Fundo estrelado animado */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 60s linear infinite;
opacity:0.6;
z-index:-2;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* Aura */
.aura{
position:absolute;
bottom:10%;
left:50%;
transform:translateX(-50%);
width:450px;
height:450px;
background:radial-gradient(circle,#7a4dff55 0%,transparent 70%);
filter:blur(40px);
animation:pulse 6s infinite alternate;
z-index:-1;
}

@keyframes pulse{
from{opacity:0.6;transform:translateX(-50%) scale(1);}
to{opacity:1;transform:translateX(-50%) scale(1.1);}
}

/* Luna */
.luna{
position:absolute;
bottom:10%;
left:50%;
transform:translateX(-50%);
width:380px;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translate(-50%,0);}
50%{transform:translate(-50%,-20px);}
}

/* Chat */
.chat{
position:fixed;
right:20px;
bottom:20px;
width:350px;
background:rgba(20,0,50,0.9);
padding:20px;
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 0 20px #7a4dff55;
}

textarea{
width:100%;
height:60px;
background:black;
color:white;
border:none;
padding:10px;
border-radius:10px;
resize:none;
}

button{
margin-top:10px;
width:100%;
padding:10px;
background:#7a4dff;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#9c6cff;
}

.response{
margin-top:15px;
max-height:150px;
overflow:auto;
font-size:14px;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="aura"></div>

<img src="luna.png" class="luna">

<div class="chat">
<textarea id="input" placeholder="Pergunte algo para Luna..."></textarea>
<button onclick="askLuna()">Conversar</button>
<div class="response" id="response"></div>
</div>

<script>
async function askLuna(){
const input=document.getElementById("input").value;
const responseDiv=document.getElementById("response");
responseDiv.innerHTML="Luna está pensando...";

try{
const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:input})
});

const data=await res.json();
responseDiv.innerHTML=data.choices[0].message.content;
}catch(err){
responseDiv.innerHTML="Erro ao conectar com Luna.";
}
}
</script>

</body>
</html>
